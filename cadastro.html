<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plenitude - Cadastro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <header>
        <div class="container">
            <a class="logo" href="index.html">
                <img src="Plenitude-logo.png" alt="Plenitude Logo">
                <span>Plenitude</span>
            </a>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Crie sua conta</h2>
            <p>Cadastre-se agora para começar sua jornada com cursos práticos e conteúdo atualizado.</p>
            <form id="signup-form" action="#">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Seu E-mail" required>

                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Sua Senha" required>

                <label for="confirmar-senha">Confirmar Senha</label>
                <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Confirme sua senha" required>

                <button type="submit" class="primary-btn">Cadastrar</button>
            </form>
            <a class="secondary-link" href="login.html">Já possui conta? Faça login</a>
        </div>
    </main>

    <footer class="auth-footer">
        <nav>
            <ul>
                <li><a href="#">Sobre a Plenitude</a></li>
                <li><a href="#">Cursos</a></li>
                <li><a href="#">Contato</a></li>
                <li><a href="#">Redes sociais</a></li>
            </ul>
        </nav>
    </footer>

    <script src="script.js"></script>
</body>
</html>
